<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title - LamaStudio</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }
        sidebar {
            width: 280px; background-color: var(--sidebar-bg); border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; position: fixed; height: 100vh; left: 0; top: 0;
        }
        .sidebar-top { display: flex; flex-direction: column; }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-main); margin-bottom: 3rem; }
        .logo-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 22px; height: 22px; fill: #ffffff; }
        .logo-text { font-size: 1.3rem; font-weight: 700; }
        nav { display: flex; flex-direction: column; gap: 0.5rem; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 0.75rem 1rem; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        nav a:hover, nav a.active { color: var(--text-main); background: rgba(99, 102, 241, 0.1); }
        .sidebar-footer { font-size: 0.85rem; color: var(--text-muted); }
        main { margin-left: 280px; flex: 1; padding: 4rem 5%; max-width: 1000px; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        h1 { margin-bottom: 1.5rem; font-size: 2.5rem; color: #818cf8; }
        p { color: var(--text-muted); margin-bottom: 1rem; font-size: 1.1rem; }
        @media (max-width: 900px) {
            body { flex-direction: column; }
            sidebar { position: relative; width: 100%; height: auto; }
            main { margin-left: 0; padding: 2rem 5%; }
        }
    </style>
</head>
<body>

    <sidebar>
        <div class="sidebar-top">
            <a href="index.html" class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C9.5 2 7 3.5 6 6L5 12L6 20C6 21.1 6.9 22 8 22H16C17.1 22 18 21.1 18 20L19 12L18 6C17 3.5 14.5 2 12 2M9 7C9.6 7 10 7.4 10 8C10 8.6 9.6 9 9 9C8.4 9 8 8.6 8 8C8 7.4 8.4 7 9 7M15 7C15.6 7 16 7.4 16 8C16 8.6 15.6 9 15 9C14.4 9 14 8.6 14 8C14 7.4 14.4 7 15 7M12 11C14 11 15.5 12.5 15.5 14.5C15.5 16 14.2 17.5 12 19C9.8 17.5 8.5 16 8.5 14.5C8.5 12.5 10 11 12 11Z"/></svg>
                </div>
                <span class="logo-text">LamaStudio</span>
            </a>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a> <!-- Change class="active" on respective pages -->
                <a href="services.html">Services</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
        <div class="sidebar-footer">
            <p>&copy; 2026 LamaStudio</p>
        </div>
    </sidebar>

    <main>
        <div class="card">
            <h1>Page Heading Here</h1>
            <p>Your content goes here.</p>
        </div>
    </main>

</body>
</html>
