<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LamaStudio</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-main); }
        .logo-icon {
            width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 26px; height: 26px; fill: #ffffff; }
        .logo-text { font-size: 1.5rem; font-weight: 700; }
        nav a { color: var(--text-muted); text-decoration: none; margin-left: 2rem; font-weight: 500; transition: color 0.2s; }
        nav a:hover, nav a.active { color: var(--text-main); }
        .container { max-width: 900px; margin: 4rem auto; padding: 0 5%; }
        .card { background-color: var(--card-bg); border-radius: 16px; padding: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        h1 { margin-bottom: 1.5rem; font-size: 2.5rem; color: #818cf8; }
        p { color: var(--text-muted); margin-bottom: 1rem; font-size: 1.1rem; }
        footer { text-align: center; padding: 3rem 5%; color: var(--text-muted); border-top: 1px solid rgba(255, 255, 255, 0.1); margin-top: 4rem; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C9.5 2 7 3.5 6 6L5 12L6 20C6 21.1 6.9 22 8 22H16C17.1 22 18 21.1 18 20L19 12L18 6C17 3.5 14.5 2 12 2M9 7C9.6 7 10 7.4 10 8C10 8.6 9.6 9 9 9C8.4 9 8 8.6 8 8C8 7.4 8.4 7 9 7M15 7C15.6 7 16 7.4 16 8C16 8.6 15.6 9 15 9C14.4 9 14 8.6 14 8C14 7.4 14.4 7 15 7M12 11C14 11 15.5 12.5 15.5 14.5C15.5 16 14.2 17.5 12 19C9.8 17.5 8.5 16 8.5 14.5C8.5 12.5 10 11 12 11Z"/></svg>
            </div>
            <span class="logo-text">LamaStudio</span>
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h1>Contact Us</h1>
            <p>Have questions regarding our services or applications like LamaVPN Pro? Reach out to our support team directly.</p>
            <p>Support Email: <a href="mailto:support@lamastudio.pk" style="color: var(--primary);">support@lamastudio.pk</a></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 LamaStudio. All rights reserved.</p>
    </footer>

</body>
</html>
